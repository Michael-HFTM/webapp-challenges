name: CodeGuardian Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- 'challenges/' > /tmp/pr-diff.txt
          echo "diff_size=$(wc -c < /tmp/pr-diff.txt)" >> "$GITHUB_OUTPUT"

      - name: Find challenge and codeguardian config
        id: config
        run: |
          # Find which challenge directory was changed
          CHALLENGE_DIR=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'challenges/' | head -1 | cut -d'/' -f1-2)
          echo "challenge_dir=$CHALLENGE_DIR" >> "$GITHUB_OUTPUT"

          if [ -f "$CHALLENGE_DIR/.codeguardian.json" ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
            cat "$CHALLENGE_DIR/.codeguardian.json" > /tmp/codeguardian.json
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run CodeGuardian Review
        if: steps.config.outputs.has_config == 'true'
        env:
          MINIMAX_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          DIFF=$(cat /tmp/pr-diff.txt)
          CONFIG=$(cat /tmp/codeguardian.json)
          INSTRUCTIONS=$(cat .github/copilot-instructions.md)

          # Build the API request
          PAYLOAD=$(jq -n \
            --arg model "MiniMax-M2.7" \
            --arg system "$INSTRUCTIONS" \
            --arg diff "$DIFF" \
            --arg config "$CONFIG" \
            '{
              model: $model,
              max_tokens: 4096,
              system: $system,
              messages: [
                {
                  role: "user",
                  content: ("Hier ist der PR-Diff:\n\n```diff\n" + $diff + "\n```\n\nHier ist die .codeguardian.json:\n\n```json\n" + $config + "\n```\n\nErstelle jetzt das CodeGuardian Review im exakten Format aus deinen Instruktionen. KEIN Loesungscode, KEINE Inline-Kommentare, NUR die Bug-Tracker-Tabelle.")
                }
              ]
            }')

          # Call MiniMax API (Anthropic-compatible)
          RESPONSE=$(curl -s -X POST "https://api.minimax.io/anthropic/v1/messages" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $MINIMAX_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -d "$PAYLOAD")

          # Extract the review text
          REVIEW=$(echo "$RESPONSE" | jq -r '[.content[] | select(.type=="text") | .text] | first // empty')

          # Strip markdown codeblock wrapper if present
          REVIEW=$(echo "$REVIEW" | sed '/^```markdown$/d; /^```$/d')

          if [ -z "$REVIEW" ]; then
            echo "Error: No review generated"
            echo "API Response: $RESPONSE"
            exit 1
          fi

          # Post as PR comment
          gh pr comment ${{ github.event.pull_request.number }} --body "$REVIEW"

      - name: Post no-config notice
        if: steps.config.outputs.has_config == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body \
            "Diese Challenge hat kein automatisches CodeGuardian-Review. Bitte wende dich an den Dozenten für Feedback."
